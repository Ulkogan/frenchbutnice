<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EAE1D2">
<title>ASCII Waveform — shader study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EAE1D2;
    --ink: #3A332A;
    --dim: #A89F8F;
    --accent: #FFFFFF;
    --water: #6BB9C4;
    --pad-x: 24px;
    --pad-y: 24px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', 'SF Mono', ui-monospace, monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: block;
  }
  .hud {
    position: fixed;
    left: max(var(--pad-x), env(safe-area-inset-left));
    top: max(var(--pad-y), env(safe-area-inset-top));
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 2;
  }
  .hud .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .hud .row { margin-bottom: 4px; }
  .hud .row span:first-child { color: var(--ink); opacity: 0.7; }

  .caption {
    position: fixed;
    left: max(var(--pad-x), env(safe-area-inset-left));
    right: max(var(--pad-x), env(safe-area-inset-right));
    bottom: 10px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  body[data-theme="night"] {
    --bg: #0B1518;
    --ink: #D6E7EA;
    --dim: #4A5A5E;
    --accent: #F3EFE6;
    --water: #2F6B76;
  }

  button.theme {
    position: fixed;
    right: max(var(--pad-x), env(safe-area-inset-right));
    top: max(calc(var(--pad-y) - 4px), env(safe-area-inset-top));
    z-index: 3;
    background: transparent;
    color: var(--dim);
    border: 1px solid currentColor;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    min-height: 32px;
  }
  button.theme:hover,
  button.theme:active { color: var(--ink); }

  /* Controls dock */
  .dock {
    position: fixed;
    left: max(var(--pad-x), env(safe-area-inset-left));
    right: max(var(--pad-x), env(safe-area-inset-right));
    bottom: max(var(--pad-y), env(safe-area-inset-bottom));
    z-index: 3;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .knob {
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid color-mix(in srgb, var(--dim) 40%, transparent);
    padding: 10px 12px 12px;
    min-width: 0;
  }
  .knob-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    gap: 8px;
  }
  .knob-label { color: var(--ink); opacity: 0.85; white-space: nowrap; }
  .knob-value {
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  input[type=range].slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 28px;
    background: transparent;
    cursor: pointer;
    display: block;
  }
  input[type=range].slider:focus { outline: none; }
  input[type=range].slider::-webkit-slider-runnable-track {
    height: 2px;
    background: color-mix(in srgb, var(--dim) 60%, transparent);
  }
  input[type=range].slider::-moz-range-track {
    height: 2px;
    background: color-mix(in srgb, var(--dim) 60%, transparent);
  }
  input[type=range].slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border: 2px solid var(--bg);
    border-radius: 50%;
    margin-top: -8px;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=range].slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: var(--accent);
    border: 2px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 0 1px var(--accent);
  }

  select.picker,
  input[type=color].color {
    width: 100%;
    height: 28px;
    background: transparent;
    color: var(--ink);
    border: 1px solid color-mix(in srgb, var(--dim) 60%, transparent);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 8px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  select.picker {
    background-image:
      linear-gradient(45deg, transparent 50%, var(--dim) 50%),
      linear-gradient(135deg, var(--dim) 50%, transparent 50%);
    background-position:
      calc(100% - 14px) 50%,
      calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 28px;
  }
  select.picker option { background: var(--bg); color: var(--ink); }
  input[type=color].color {
    padding: 2px;
    cursor: pointer;
  }
  input[type=color].color::-webkit-color-swatch-wrapper { padding: 0; }
  input[type=color].color::-webkit-color-swatch { border: none; border-radius: 0; }
  input[type=color].color::-moz-color-swatch { border: none; border-radius: 0; }

  @media (max-width: 960px) {
    .dock { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 720px) {
    .dock { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 520px) {
    :root { --pad-x: 14px; --pad-y: 14px; }
    .hud { font-size: 10px; }
    .caption { display: none; }
    button.theme { font-size: 9px; padding: 7px 10px; }
    .knob { padding: 8px 10px 10px; }
    .knob-head { font-size: 9px; margin-bottom: 6px; }
    input[type=range].slider { height: 24px; }
    select.picker, input[type=color].color { height: 26px; font-size: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .hud .dot { animation: none; }
  }
</style>
</head>
<body>
  <div class="hud">
    <div class="row"><span class="dot"></span>SIGNAL · LIVE</div>
    <div class="row"><span>CH</span> &nbsp; 01 / 01</div>
    <div class="row"><span>SR</span> &nbsp; 48.0 kHz</div>
  </div>
  <button class="theme" onclick="document.body.dataset.theme = document.body.dataset.theme === 'night' ? '' : 'night'">Theme</button>
  <canvas id="stage"></canvas>
  <div class="caption">
    <span>ASCII · WAVEFORM · SHADER</span>
    <span>frenchbutnice / 001</span>
  </div>
  <div class="dock" role="group" aria-label="Waveform controls">
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Swell</span><span class="knob-value" id="vEnergy">0.45</span></div>
      <input class="slider" id="energy" type="range" min="0" max="100" value="45" aria-label="Swell">
    </div>
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Chop</span><span class="knob-value" id="vTurb">0.12</span></div>
      <input class="slider" id="turb" type="range" min="0" max="100" value="12" aria-label="Chop">
    </div>
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Trace</span><span class="knob-value" id="vTrails">6</span></div>
      <input class="slider" id="trails" type="range" min="0" max="10" value="6" step="1" aria-label="Trace">
    </div>
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Size</span><span class="knob-value" id="vSize">14</span></div>
      <input class="slider" id="size" type="range" min="8" max="32" value="14" step="1" aria-label="Particle size">
    </div>
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Particle</span><span class="knob-value" id="vParticle">Dots</span></div>
      <select class="picker" id="particle" aria-label="Particle type">
        <option value="dots">Dots</option>
        <option value="bars">Bars</option>
        <option value="ascii">ASCII</option>
        <option value="shade">Shade</option>
        <option value="geom">Geom</option>
        <option value="lines">Lines</option>
      </select>
    </div>
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Foam</span><span class="knob-value" id="vColor">#FFFFFF</span></div>
      <input class="color" id="color" type="color" value="#FFFFFF" aria-label="Foam color">
    </div>
    <div class="knob">
      <div class="knob-head"><span class="knob-label">Water</span><span class="knob-value" id="vWater">#6BB9C4</span></div>
      <input class="color" id="water" type="color" value="#6BB9C4" aria-label="Water color">
    </div>
  </div>
<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d', { alpha: false });

  // Each preset: ramp from faintest → densest. Used for both interior and peak.
  const PARTICLES = {
    dots:  ' .·•◉●',
    bars:  ' ▁▂▃▄▅▆▇█',
    ascii: ' .:-=+*#%@',
    shade: ' ░▒▓█',
    geom:  ' ·◦○◉●',
    lines: ' _-~=≡≣',
  };

  const isSmall = () => window.innerWidth < 520;

  let cssW, cssH, dpr, cols, rows, cellW, cellH, fontPx;
  let styleCache = { bg: '', ink: '', dim: '' };
  let lastThemeKey = '';

  const params = {
    energy: 0.55,
    turbulence: 0.18,
    trails: 6,
    size: 14,
    particle: 'dots',
    color: '#FFFFFF',
    water: '#6BB9C4',
  };

  const el = (id) => document.getElementById(id);
  const vEnergy = el('vEnergy'), vTurb = el('vTurb'), vTrails = el('vTrails');
  const vSize = el('vSize'), vParticle = el('vParticle'), vColor = el('vColor');
  const vWater = el('vWater');

  function bindSlider(id, key, out, fmt) {
    const node = el(id);
    const apply = () => {
      const v = node.step === '1' ? parseInt(node.value, 10) : node.value / 100;
      params[key] = v;
      out.textContent = fmt ? fmt(v) : (typeof v === 'number' && !Number.isInteger(v) ? v.toFixed(2) : v);
      if (key === 'size') resize();
    };
    node.addEventListener('input', apply);
    apply();
  }
  bindSlider('energy', 'energy', vEnergy);
  bindSlider('turb', 'turbulence', vTurb);
  bindSlider('trails', 'trails', vTrails);
  bindSlider('size', 'size', vSize);

  el('particle').addEventListener('change', (e) => {
    params.particle = e.target.value;
    vParticle.textContent = e.target.options[e.target.selectedIndex].text;
  });
  el('color').addEventListener('input', (e) => {
    params.color = e.target.value;
    vColor.textContent = e.target.value.toUpperCase();
    document.documentElement.style.setProperty('--accent', e.target.value);
  });
  el('water').addEventListener('input', (e) => {
    params.water = e.target.value;
    vWater.textContent = e.target.value.toUpperCase();
    document.documentElement.style.setProperty('--water', e.target.value);
  });
  document.documentElement.style.setProperty('--accent', params.color);
  document.documentElement.style.setProperty('--water', params.water);

  function refreshStyle() {
    const cs = getComputedStyle(document.body);
    const key = document.body.dataset.theme || 'dark';
    if (key === lastThemeKey) return;
    lastThemeKey = key;
    styleCache.bg = cs.getPropertyValue('--bg').trim();
    styleCache.ink = cs.getPropertyValue('--ink').trim();
    styleCache.dim = cs.getPropertyValue('--dim').trim();
  }

  // Convert #rrggbb to "r,g,b" for rgba() alpha control
  function rgbTuple(hex) {
    const h = hex.replace('#', '');
    const n = parseInt(h.length === 3
      ? h.split('').map(c => c + c).join('')
      : h, 16);
    return `${(n >> 16) & 255},${(n >> 8) & 255},${n & 255}`;
  }

  function resize() {
    const rawDpr = window.devicePixelRatio || 1;
    dpr = Math.min(rawDpr, isSmall() ? 1.5 : 2);
    cssW = window.innerWidth;
    cssH = window.innerHeight;
    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';

    fontPx = params.size;
    cellW = fontPx * 0.62;
    cellH = fontPx * 1.05;
    cols = Math.ceil(cssW / cellW) + 1;
    rows = Math.ceil(cssH / cellH) + 1;
    lastThemeKey = '';
  }

  function hash(n) {
    n = (n << 13) ^ n;
    return (1.0 - ((n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff) / 1073741824.0);
  }
  function noise1(x) {
    const i = Math.floor(x);
    const f = x - i;
    const u = f * f * (3 - 2 * f);
    return hash(i) * (1 - u) + hash(i + 1) * u;
  }

  // 2D value noise (smoothstep interp), output roughly in [-1, 1]
  function hash2(x, y) {
    let n = (x | 0) * 374761393 + (y | 0) * 668265263;
    n = (n ^ (n >>> 13)) * 1274126177;
    n = n ^ (n >>> 16);
    return (((n & 0x7fffffff) / 1073741824) - 1);
  }
  function noise2(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const u = xf * xf * (3 - 2 * xf);
    const v = yf * yf * (3 - 2 * yf);
    const a = hash2(xi, yi);
    const b = hash2(xi + 1, yi);
    const c = hash2(xi, yi + 1);
    const d = hash2(xi + 1, yi + 1);
    return (a * (1 - u) + b * u) * (1 - v) + (c * (1 - u) + d * u) * v;
  }

  // Irregular surge profile — composite of slow cycles, sharpened so
  // waves come in as short surges with longer quiet retreats.
  function surgeProfile(t) {
    const s1 = (Math.sin(t * 0.22) + 1) * 0.5;
    const s2 = (Math.sin(t * 0.37 + 1.7) + 1) * 0.5;
    const s3 = (Math.sin(t * 0.13 + 3.1) + 1) * 0.5;
    const blend = s1 * 0.5 + s2 * 0.3 + s3 * 0.2;
    return Math.pow(blend, 1.7);
  }

  // Top-down shoreline view: the water edge is a mostly-horizontal line
  // near the lower part of the screen that advances upward during a
  // surge and retreats downward. Returns a row-space y for column u.
  function edgeY(u, t) {
    const chop = params.turbulence;
    const restY = rows * 0.72;                        // sea's resting edge (lower half)
    const maxPushRows = rows * 0.46;                  // farthest surge up the beach
    const surge = surgeProfile(t);
    const push = surge * maxPushRows * (0.30 + 1.15 * params.energy);

    // Slow along-edge undulation (a bit of natural curvature)
    const wobble = Math.sin(u * Math.PI * 2 * 1.2 - t * 0.28) * 1.3;
    // Chop: small high-freq bumps scaled by turbulence
    const bumps = Math.sin(u * Math.PI * 2 * 4.5 - t * 0.7) * 0.9 * chop;
    const jitter = noise1(u * 6 + t * 0.4) * 1.8 * chop;

    return restY - push + wobble + bumps + jitter;
  }

  // Solid-ish water fill from the edge down to the bottom of the stage,
  // drawn as a single path so the boundary follows the curvy edge line.
  function drawWater(t, waterTuple) {
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    const stepsX = cols;
    for (let x = 0; x <= stepsX; x++) {
      const u = x / stepsX;
      const yRows = edgeY(u, t);
      const yPx = Math.max(0, yRows * cellH) * dpr;
      ctx.lineTo(x * cellW * dpr, yPx);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fillStyle = `rgba(${waterTuple},0.88)`;
    ctx.fill();
  }

  // Cellular foam along the edge + tendrils reaching onto the sand.
  // Uses thresholded 2D value noise to break the band into bubble-like
  // clusters; tendril zone extends above the edge with falling density.
  function drawFoam(t, ramp, colorTuple) {
    const rampLast = ramp.length - 1;
    const surge = surgeProfile(t);
    // Thickness values in rows
    const waterFoamRows = 2.5;                          // foam reaching into the water
    const sandFoamRows = 1.4 + 1.8 * surge;             // main foam lip on sand side
    const tendrilRows = 3.5 + 4.5 * surge;              // spiky fingers past the lip

    // Noise coordinate scaling — lower = bigger cells
    const nScaleX = 0.34;
    const nScaleY = 0.55;
    const nTime = t * 0.28;

    for (let x = 0; x < cols; x++) {
      const u = x / cols;
      const yEdge = edgeY(u, t);
      const yStart = Math.max(0, Math.floor(yEdge - tendrilRows - 1));
      const yEnd = Math.min(rows - 1, Math.ceil(yEdge + waterFoamRows + 1));

      for (let y = yStart; y <= yEnd; y++) {
        // d > 0 → sand side (above edge on screen); d < 0 → water side
        const d = yEdge - (y + 0.5);
        const nx = x * nScaleX + nTime;
        const ny = y * nScaleY;

        // Composite noise — medium cells + finer detail
        const n1 = noise2(nx, ny);
        const n2 = noise2(nx * 2.1 + 11.3, ny * 2.1 - 4.7) * 0.5;
        const n = (n1 + n2) * 0.7 + 0.5; // shift to ~[0,1]

        let density = 0;

        if (d <= 0 && d >= -waterFoamRows) {
          // Foam-in-water: bubble pattern via thresholded noise
          const t01 = (-d) / waterFoamRows;
          const envelope = 1 - t01 * 0.7;
          density = Math.max(0, (n - 0.42) * 2.6 * envelope);
        } else if (d > 0 && d <= sandFoamRows) {
          // Main foam lip — brighter, more solid, still broken by noise
          const t01 = d / sandFoamRows;
          const envelope = Math.pow(1 - t01, 0.75);
          density = Math.max(0, envelope * (0.55 + 0.55 * (n - 0.3)));
        } else if (d > sandFoamRows && d <= tendrilRows) {
          // Tendrils / fingers reaching onto the sand
          const t01 = (d - sandFoamRows) / Math.max(0.001, tendrilRows - sandFoamRows);
          // Stretch noise vertically for finger-like shapes
          const tN = noise2(nx * 1.8, ny * 0.35 + t * 0.12);
          const tF = tN * 0.6 + (n - 0.5) * 0.6;
          const fall = Math.pow(1 - t01, 1.6);
          density = Math.max(0, (tF - 0.15) * 2.4 * fall * (0.5 + 0.7 * surge));
        }

        if (density < 0.08) continue;
        const intensity = Math.min(1, density);
        const idx = Math.min(rampLast, Math.max(0, Math.floor(intensity * ramp.length)));
        const ch = ramp[idx];
        if (!ch || ch === ' ') continue;
        const alpha = 0.45 + 0.55 * intensity;
        ctx.fillStyle = `rgba(${colorTuple},${alpha})`;
        const px = (x * cellW + cellW / 2) * dpr;
        const py = (y * cellH + cellH / 2) * dpr;
        ctx.fillText(ch, px, py);
      }
    }
  }

  function frame(ms) {
    const t = ms * 0.001;
    refreshStyle();

    // Persistence fade — semi-transparent bg wash each frame leaves a
    // trace of past wave positions that slowly recedes, like sand.
    // trace=0 → nearly full clear; trace=10 → long-lasting imprint.
    const traceT = Math.max(0, Math.min(10, params.trails)) / 10;
    const fadeAlpha = 0.28 * Math.pow(1 - traceT, 1.4) + 0.012;
    ctx.fillStyle = `rgba(${rgbTuple(styleCache.bg)},${fadeAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = `400 ${fontPx * dpr}px "DM Mono", "SF Mono", ui-monospace, monospace`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';

    const ramp = PARTICLES[params.particle] || PARTICLES.dots;
    const foamTuple = rgbTuple(params.color);
    const waterTuple = rgbTuple(params.water);

    drawWater(t, waterTuple);
    drawFoam(t, ramp, foamTuple);

    requestAnimationFrame(frame);
  }

  let resizeRaf = 0;
  window.addEventListener('resize', () => {
    cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(resize);
  });
  window.addEventListener('orientationchange', () => setTimeout(resize, 120));

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
